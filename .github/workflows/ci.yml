name: BWC Quant Telemetry & Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Bypass Node.js 20 deprecation warnings for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Prevent .pyc files from polluting or hiding execution drift
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  scientific-computation:
    name: "Reproducible Analytics Framework"
    runs-on: ubuntu-latest

    # OIDC identity allows secure Doppler Service Token swaps
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # UV Dependency Engine - Fastest package management in CI
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: "Set up Python 3.12"
        run: uv python install 3.12

      - name: Install System Dependencies for Manim
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev ffmpeg

      # Extract 100% reproducible state (Phase 35 Ticker agnostic check)
      - name: Zero-Drift Sync
        run: uv sync --frozen

      # DOPPLER SECRETS INJECTION
      # Uses short-lived ephemeral Service Tokens (Least Privilege access)
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Aggressive Matrix & Backtest Validation
        env:
          # NEVER use Personal Tokens here. Service Token restricts to prd config.
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        run: |
          if [ -z "$DOPPLER_TOKEN" ]; then
            echo "No Doppler token provided, falling back to local ENV for testing..."
            uv run pytest tests/ -v
            uv run ruff check .
            uv run ty check quant_monitor
            uv run bandit -r quant_monitor/ -c pyproject.toml
            uv run deptry .
          else
            doppler run -- uv run pytest tests/ -v
            doppler run -- uv run ruff check .
            doppler run -- uv run ty check quant_monitor
            doppler run -- uv run bandit -r quant_monitor/ -c pyproject.toml
            doppler run -- uv run deptry .
          fi

  deploy-endpoints:
    name: "Deploy State & UI"
    needs: scientific-computation
    runs-on: ubuntu-latest
    # Allow GitHub Pages deployment even if lint/test job fails.
    # The website build does not depend on the scientific-computation results.
    if: always() && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install System Dependencies for Manim
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev ffmpeg

      - name: Build All Frontend Assets
        run: |
          uv sync --frozen
          uv run python scripts/build_frontend_assets.py --output-dir frontend

      - name: Build MkDocs Documentation
        run: |
          uv run mkdocs build -f docs/mkdocs.yml -d ../frontend/docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages

