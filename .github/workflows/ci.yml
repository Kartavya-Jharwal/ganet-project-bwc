name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy quant_monitor/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # non-blocking until stubs are filled

      - name: Test
        run: uv run pytest tests/ -v --tb=short
        env:
          # Doppler not available in CI — tests should mock secrets
          ALPACA_API_KEY: "test"
          ALPACA_SECRET_KEY: "test"
